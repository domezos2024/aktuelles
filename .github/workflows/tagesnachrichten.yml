name: Tagesnachrichten – Tägliches Update 06:00 Uhr

on:
  schedule:
    # 06:00 Uhr Berlin (CEST = UTC+2 → 04:00 UTC)
    # Im Winter (MEZ = UTC+1) läuft es um 05:00 UTC = 06:00 MEZ
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Grund für manuellen Start (optional)'
        required: false
        default: 'Manueller Test'

jobs:
  tagesnachrichten:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Git-Konfiguration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tagesnachrichten – Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          mode: agent
          direct_prompt: |
            Führe den Skill tagesnachrichten-lohr-aschaffenburg vollständig aus (Schritte 1–8).
            Hinweis: ${{ github.event.inputs.reason || 'automatischer Tagesstart 06:00 Uhr' }}.
            Git-Konfiguration (name/email) ist bereits gesetzt.
            Erstelle alle Änderungen auf einem neuen Branch, committe, pushe und erstelle einen Pull Request nach main.
            Merge den PR anschließend selbst (squash merge).
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,WebSearch,WebFetch,Read,Write,Edit,Glob,Grep"
          model: claude-sonnet-4-6

      - name: Benachrichtigung bei Fehler (GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Tagesnachrichten-Workflow fehlgeschlagen – ${today}`,
              body: `## Automatischer Workflow fehlgeschlagen\n\n**Datum:** ${today}\n**Run:** [Logs ansehen](${runUrl})\n\n### Mögliche Ursachen\n- Anthropic API-Guthaben aufgebraucht → [Guthaben aufladen](https://console.anthropic.com/)\n- Netzwerkfehler bei Nachrichtenquellen\n- GitHub-Berechtigungsproblem\n\n### Nächste Schritte\n1. Logs prüfen (Link oben)\n2. Guthaben ggf. aufladen\n3. Workflow manuell neu starten: [workflow_dispatch](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/tagesnachrichten.yml)\n\n_Dieses Issue wurde automatisch erstellt._`,
              labels: ['workflow-fehler']
            });
