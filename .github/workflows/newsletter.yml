name: Newsletter – Täglicher Versand 07:00 Uhr CEST

on:
  schedule:
    # 07:00 Uhr CEST (= UTC+2) → 05:00 UTC
    # Im Winter (MEZ = UTC+1): 07:00 MEZ = 06:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Testlauf ohne echten Versand (true/false)'
        required: false
        default: 'false'

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Newsletter versenden
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "[DRY RUN] Würde Newsletter an folgende Adressen senden:"
            grep -E "^- .+@.+\..+" email_list.md || echo "(keine Empfänger)"
          else
            python3 send_newsletter.py
          fi
